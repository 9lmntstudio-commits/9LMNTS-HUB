[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_version = "18"

# SPA routing - handle client-side routes
[[redirects]]
  from = "/event-os/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/sound-clash-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/wedding-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/festival-flow"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/corporate-clash-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/game-night-pro"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/conference-connect"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/red-carpet"
  to = "/index.html"
  status = 200

# API redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
