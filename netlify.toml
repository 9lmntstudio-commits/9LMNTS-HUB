[build]
  command = "npm run build"
  publish = "dist"

# This handles React Router redirects so you don't get a 404 on page refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Directory for your Netlify/Stripe functions
[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
