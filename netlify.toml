[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# SPA routing - handle client-side routes
[[redirects]]
  from = "/event-os/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/sound-clash-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/wedding-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/festival-flow"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/corporate-clash-os"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/game-night-pro"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/conference-connect"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/red-carpet"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/payments"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/emergency-nye"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin"
