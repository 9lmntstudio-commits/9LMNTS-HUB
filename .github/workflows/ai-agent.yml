name: 9LMNTS AI Developer
on: [push] # This triggers the AI every time you save code

jobs:
  build_and_fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Install Tools
        run: npm install
        
      - name: Build Site
        run: npm run build
