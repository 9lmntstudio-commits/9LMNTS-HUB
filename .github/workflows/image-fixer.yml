name: Image Path AI Fixer
on:
  workflow_dispatch: # This lets you press a button to start the fix

jobs:
  fix-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Path Replacement
        run: |
          # This command tells the AI to find every broken image path and point it to /public
          sed -i 's|src="logo.png"|src="/logo-clean.png.png"|g' src/components/Navbar.tsx
          sed -i 's|image: ".*"|image: "/sound clash os.jpg"|g' src/components/PortfolioPage.tsx
      - name: Commit Fixes
        run: |
          git config user.name "9LMNTS-AI-Agent"
          git config user.email "agent@9lmnts.com"
          git add .
          git commit -m "AI Agent: Fixed 19 portfolio images and logo"
          git push
