<!-- LOA Chat Widget - Static HTML Version for Event OS Apps -->
<div id="loa-chat-widget" class="loa-chat-widget">
    <!-- Chat Bubble -->
    <div id="loa-chat-bubble" class="loa-chat-bubble">
        <div class="loa-bubble-content">
            <span>LOA</span>
            <div class="loa-status-dot"></div>
        </div>
    </div>

    <!-- Chat Window -->
    <div id="loa-chat-window" class="loa-chat-window" style="display: none;">
        <!-- Header -->
        <div class="loa-chat-header">
            <div class="loa-header-content">
                <div class="loa-avatar">
                    <span>LOA</span>
                </div>
                <div class="loa-header-info">
                    <h3>LOA - Event OS Deployer</h3>
                    <p>24-hour deployment • Online</p>
                </div>
            </div>
            <button id="loa-close-btn" class="loa-close-btn">✕</button>
        </div>

        <!-- Messages -->
        <div id="loa-messages" class="loa-messages">
            <div class="loa-message loa-message-loa">
                <div class="loa-message-content">
                    <p>LOA here. I deploy event platforms in 24 hours. Pitch Battle ($3.5k), Wedding OS ($2.5k), Gaming ($2k). Which do you need? Say 'PITCH', 'WEDDING', or 'GAMING'. Reply DEPLOY to confirm or say 'screen share' for immediate demo.</p>
                    <span class="loa-message-time">Just now</span>
                </div>
            </div>
        </div>

        <!-- Quick Replies -->
        <div class="loa-quick-replies">
            <button class="loa-quick-btn" data-keyword="pitch">
                <span>Pitch Battle OS</span>
                <span class="loa-price">$3,500</span>
            </button>
            <button class="loa-quick-btn" data-keyword="wedding">
                <span>Wedding OS</span>
                <span class="loa-price">$2,500</span>
            </button>
            <button class="loa-quick-btn" data-keyword="gaming">
                <span>Gaming OS</span>
                <span class="loa-price">$2,000</span>
            </button>
            <button class="loa-quick-btn" data-keyword="deposit">
                <span>Deposit Info</span>
                <span class="loa-price">50%</span>
            </button>
        </div>

        <!-- Input -->
        <div class="loa-input-area">
            <div id="loa-input-container" class="loa-input-container">
                <input type="text" id="loa-input" placeholder="Type DEPLOY, PITCH, WEDDING, or GAMING..." />
                <button id="loa-send-btn" class="loa-send-btn">Send</button>
            </div>
            <div id="loa-email-container" class="loa-email-container" style="display: none;">
                <input type="email" id="loa-email" placeholder="Enter your email for follow-up..." />
                <div class="loa-email-buttons">
                    <button id="loa-email-submit" class="loa-email-submit">Submit</button>
                    <button id="loa-email-cancel" class="loa-email-cancel">Cancel</button>
                </div>
            </div>
            <button id="loa-email-toggle" class="loa-email-toggle">Need email follow-up? Click here</button>
        </div>
    </div>
</div>

<style>
.loa-chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
}

.loa-chat-bubble {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #ff9248 0%, #e91e63 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255, 146, 72, 0.4);
    transition: all 0.3s ease;
    animation: loa-pulse 2s infinite;
}

.loa-chat-bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 25px rgba(255, 146, 72, 0.6);
}

.loa-bubble-content {
    position: relative;
    color: white;
    font-weight: bold;
    font-size: 14px;
}

.loa-status-dot {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 12px;
    height: 12px;
    background: #10b981;
    border-radius: 50%;
    animation: loa-status-pulse 2s infinite;
}

.loa-chat-window {
    width: 350px;
    height: 550px;
    background: #1f2937;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 146, 72, 0.3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.loa-chat-header {
    background: linear-gradient(135deg, #ff9248 0%, #e91e63 100%);
    padding: 16px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.loa-header-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.loa-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.loa-header-info h3 {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
}

.loa-header-info p {
    margin: 0;
    font-size: 12px;
    opacity: 0.9;
}

.loa-close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
}

.loa-close-btn:hover {
    opacity: 1;
}

.loa-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.loa-message {
    display: flex;
    max-width: 80%;
}

.loa-message-user {
    margin-left: auto;
}

.loa-message-loa {
    margin-right: auto;
}

.loa-message-content {
    padding: 12px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
}

.loa-message-user .loa-message-content {
    background: #ff9248;
    color: white;
    border-bottom-right-radius: 4px;
}

.loa-message-loa .loa-message-content {
    background: #374151;
    color: #f3f4f6;
    border: 1px solid #4b5563;
    border-bottom-left-radius: 4px;
}

.loa-message-time {
    display: block;
    font-size: 11px;
    opacity: 0.7;
    margin-top: 4px;
}

.loa-quick-replies {
    padding: 12px 16px;
    border-top: 1px solid #374151;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.loa-quick-btn {
    background: #374151;
    border: 1px solid #4b5563;
    color: #d1d5db;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.loa-quick-btn:hover {
    background: #4b5563;
    border-color: #ff9248;
    color: white;
}

.loa-quick-btn span {
    display: block;
}

.loa-quick-btn .loa-price {
    color: #ff9248;
    font-weight: bold;
    font-size: 12px;
    margin-top: 2px;
}

.loa-input-area {
    padding: 16px;
    border-top: 1px solid #374151;
}

.loa-input-container {
    display: flex;
    gap: 8px;
}

.loa-input-container input {
    flex: 1;
    background: #374151;
    border: 1px solid #4b5563;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
}

.loa-input-container input:focus {
    outline: none;
    border-color: #ff9248;
}

.loa-send-btn {
    background: #ff9248;
    color: white;
    border: none;
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}

.loa-send-btn:hover {
    background: #ea8238;
}

.loa-email-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.loa-email-container input {
    background: #374151;
    border: 1px solid #4b5563;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
}

.loa-email-container input:focus {
    outline: none;
    border-color: #ff9248;
}

.loa-email-buttons {
    display: flex;
    gap: 8px;
}

.loa-email-submit {
    flex: 1;
    background: #ff9248;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.loa-email-cancel {
    flex: 1;
    background: #374151;
    color: white;
    border: 1px solid #4b5563;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
}

.loa-email-toggle {
    width: 100%;
    background: none;
    border: none;
    color: #6b7280;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    text-align: center;
}

.loa-email-toggle:hover {
    color: #ff9248;
}

@keyframes loa-pulse {
    0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 146, 72, 0.7);
    }
    70% {
        box-shadow: 0 0 0 15px rgba(255, 146, 72, 0);
    }
}

@keyframes loa-status-pulse {
    0%, 100% {
        opacity: 1;
        transform: scale(1);
    }
    50% {
        opacity: 0.5;
        transform: scale(1.2);
    }
}

/* Mobile Responsive */
@media (max-width: 480px) {
    .loa-chat-widget {
        bottom: 10px;
        right: 10px;
    }
    
    .loa-chat-window {
        width: calc(100vw - 40px);
        height: calc(100vh - 120px);
        bottom: 10px;
        right: 10px;
        position: fixed;
    }
    
    .loa-quick-replies {
        grid-template-columns: 1fr;
    }
}
</style>

<script>
(function() {
    // LOA Chat Widget JavaScript
    let isOpen = false;
    let messages = [];
    
    const chatBubble = document.getElementById('loa-chat-bubble');
    const chatWindow = document.getElementById('loa-chat-window');
    const closeBtn = document.getElementById('loa-close-btn');
    const messagesContainer = document.getElementById('loa-messages');
    const input = document.getElementById('loa-input');
    const sendBtn = document.getElementById('loa-send-btn');
    const quickBtns = document.querySelectorAll('.loa-quick-btn');
    const emailContainer = document.getElementById('loa-email-container');
    const inputContainer = document.getElementById('loa-input-container');
    const emailInput = document.getElementById('loa-email');
    const emailSubmit = document.getElementById('loa-email-submit');
    const emailCancel = document.getElementById('loa-email-cancel');
    const emailToggle = document.getElementById('loa-email-toggle');
    
    // Toggle chat window
    chatBubble.addEventListener('click', () => {
        isOpen = true;
        chatBubble.style.display = 'none';
        chatWindow.style.display = 'flex';
        input.focus();
    });
    
    closeBtn.addEventListener('click', () => {
        isOpen = false;
        chatBubble.style.display = 'flex';
        chatWindow.style.display = 'none';
    });
    
    // Generate LOA response
    function generateLOAResponse(userInput) {
        const input = userInput.toLowerCase();
        
        if (input.includes('pitch') || input.includes('competition') || input.includes('demo day') || input.includes('startup')) {
            return "Signal received. Pitch Battle OS deploys in 24 hours. $3,500. 50% deposit ($1,750) starts work now. Company name?";
        }
        
        if (input.includes('wedding') || input.includes('marriage') || input.includes('bride') || input.includes('weekend wedding')) {
            return "Wedding OS ready for your event. $2,500. Digital guestbook, management, experience. Wedding date?";
        }
        
        if (input.includes('gaming') || input.includes('tournament') || input.includes('esports') || input.includes('stream')) {
            return "LOA Gaming OS primed. $2,000. Brackets, voting, streams. Game title?";
        }
        
        if (input.includes('price') || input.includes('cost') || input.includes('how much')) {
            return "PITCH BATTLE OS - $3,500 (corporate competitions)\nWEDDING OS - $2,500 (digital wedding experience)\nLOA GAMING OS - $2,000 (tournament brackets)\nAll platforms: mobile-ready, branded, live in 24h";
        }
        
        if (input.includes('deposit') || input.includes('pay') || input.includes('send money')) {
            return "PayPal: 9lmntstudio@gmail.com. Send 50%: $1,750 (Pitch), $1,250 (Wedding), $1,000 (Gaming). Include 'DEPLOY [PLATFORM]' in note.";
        }
        
        if (input.includes('deploy')) {
            return "DEPLOY sequence initiated! Email address for project setup?";
        }
        
        if (input.includes('screen share') || input.includes('demo')) {
            return "Screen share ready. Email 9lmntstudio@gmail.com for immediate demo access. What's your event type?";
        }
        
        return "LOA here. I deploy event platforms in 24 hours. Pitch Battle ($3.5k), Wedding OS ($2.5k), Gaming ($2k). Which do you need? Say 'PITCH', 'WEDDING', or 'GAMING'.";
    }
    
    // Add message to chat
    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `loa-message loa-message-${sender}`;
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'loa-message-content';
        
        const textP = document.createElement('p');
        textP.textContent = text;
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'loa-message-time';
        timeSpan.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        contentDiv.appendChild(textP);
        contentDiv.appendChild(timeSpan);
        messageDiv.appendChild(contentDiv);
        
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        messages.push({text, sender, timestamp: new Date()});
    }
    
    // Send message
    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        
        addMessage(text, 'user');
        input.value = '';
        
        // Generate and send LOA response
        setTimeout(() => {
            const response = generateLOAResponse(text);
            addMessage(response, 'loa');
            
            // Send to webhook for lead tracking
            fetch('https://hooks.zapier.com/hooks/catch/YOUR_WEBHOOK_ID', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message: text,
                    response: response,
                    timestamp: new Date().toISOString(),
                    source: 'event_os_chat'
                })
            }).catch(console.error);
        }, 500);
    }
    
    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Quick reply buttons
    quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const keyword = btn.dataset.keyword;
            input.value = keyword;
            sendMessage();
        });
    });
    
    // Email form
    emailToggle.addEventListener('click', () => {
        emailContainer.style.display = 'flex';
        inputContainer.style.display = 'none';
        emailToggle.style.display = 'none';
        emailInput.focus();
    });
    
    emailCancel.addEventListener('click', () => {
        emailContainer.style.display = 'none';
        inputContainer.style.display = 'flex';
        emailToggle.style.display = 'block';
        emailInput.value = '';
    });
    
    emailSubmit.addEventListener('click', () => {
        const email = emailInput.value.trim();
        if (!email) return;
        
        // Send email to webhook
        fetch('https://hooks.zapier.com/hooks/catch/YOUR_EMAIL_WEBHOOK_ID', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: email,
                messages: messages,
                timestamp: new Date().toISOString(),
                source: 'event_os_chat_lead'
            })
        }).catch(console.error);
        
        addMessage(`Email captured: ${email}. LOA will follow up within 2 hours. For immediate deployment, reply DEPLOY.`, 'loa');
        
        emailContainer.style.display = 'none';
        inputContainer.style.display = 'flex';
        emailToggle.style.display = 'block';
        emailInput.value = '';
    });
})();
</script>
